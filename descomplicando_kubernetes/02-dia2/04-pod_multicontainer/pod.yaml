apiVersion: v1
kind: Pod
metadata:
  name: girus-1
  labels:
    run: girus-1
    service: webserver
spec:
  containers:
    - image: httpd
      name: apache
      resources:
        limits:
          cpu: "0.5"
          memory: 128Mi
        requests:
          cpu: "0.25"
          memory: 64Mi
    - image: busybox
      name: busybox
      args:
        - sleep
        - "600"
      resources:
        limits:
          cpu: "0.5"
          memory: 128Mi
        requests:
          cpu: "0.25"
          memory: 64Mi
  dnsPolicy: ClusterFirst
  restartPolicy: Always
