apiVersion: v1
kind: Pod
metadata:
  name: volume-emptydir
  labels:
    run: volume-emptydir
    service: emptydir
spec:
  containers:
    - name: app
      image: nginx
      volumeMounts:
        - name: html
          mountPath: /usr/share/nginx/html
      resources:
        limits:
          cpu: "0.5"
          memory: 128Mi
        requests:
          cpu: "0.25"
          memory: 64Mi
  restartPolicy: Always
  dnsPolicy: ClusterFirst
  volumes:
    - name: html
      emptyDir:
        sizeLimit: 512Mi
